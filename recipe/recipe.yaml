schema_version: 1

context:
  version: "0.0.4"
  python_min: "3.11"

package:
  name: langchain-agentcore-codeinterpreter
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/l/langchain-agentcore-codeinterpreter/langchain_agentcore_codeinterpreter-${{ version }}.tar.gz
  sha256: 960374c385b437d378649e8f46f684eb7c88b04a14ea7d5aebec3a66eccaed9f

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - deepagents >=0.1.0
    - bedrock-agentcore >=1.1.4
    - boto3 >=1.42.42

tests:
  - python:
      imports:
        - langchain_agentcore_codeinterpreter
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Amazon Bedrock AgentCore Code Interpreter sandbox integration for Deep Agents
  license: MIT
  license_file: LICENSE
  homepage: https://pypi.org/project/langchain-agentcore-codeinterpreter/
  repository: https://github.com/langchain-ai/langchain-aws/tree/main/libs/agentcore-codeinterpreter
  documentation: https://docs.langchain.com/oss/python/integrations/sandboxes/aws

extra:
  recipe-maintainers:
    - 3coins
    - mdrxy
    - sundargthb
    - michaelnchin
